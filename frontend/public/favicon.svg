<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f172a" />
      <stop offset="100%" stop-color="#1e1b4b" />
    </linearGradient>
    <!-- Shield Gradient (Indigo to Cyan) -->
    <linearGradient id="shieldGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#6366f1" />
      <stop offset="100%" stop-color="#06b6d4" />
    </linearGradient>
    <!-- Glowing Effect -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Background Card -->
  <rect width="512" height="512" rx="128" fill="url(#bgGrad)"/>

  <!-- Shield Outline with Glowing stroke -->
  <path d="M256 75
           C325 75, 400 95, 400 115
           C400 235, 370 355, 256 445
           C142 355, 112 235, 112 115
           C112 95, 187 75, 256 75 Z" 
        fill="none" 
        stroke="url(#shieldGrad)" 
        stroke-width="16" 
        stroke-linejoin="round"
        filter="url(#glow)"/>

  <!-- Paper Plane (3D Faceted Look) -->
  <g transform="translate(145, 150) scale(0.45)">
    <!-- Right/Top Facet (Main Wing) -->
    <path d="M500 100 L150 250 L280 320 Z" fill="#ffffff" stroke="#ffffff" stroke-width="4" stroke-linejoin="round"/>
    <!-- Under Shadow/Crease -->
    <path d="M500 100 L280 320 L320 400 Z" fill="#cbd5e1" stroke="#cbd5e1" stroke-width="4" stroke-linejoin="round"/>
    <!-- Left/Bottom Facet -->
    <path d="M500 100 L320 400 L420 310 Z" fill="#e2e8f0" stroke="#e2e8f0" stroke-width="4" stroke-linejoin="round"/>
    <!-- Fold connection -->
    <path d="M280 320 L320 400 L260 360 Z" fill="#94a3b8" stroke="#94a3b8" stroke-width="4" stroke-linejoin="round"/>
  </g>
</svg>
